<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A DigiBouquet for You</title>
    <!-- Google Fonts for the cute, handwriting aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=700&family=Fredoka:wght=300..700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fbc2d4; /* Soft pink background */
            --accent-pink: #d14d72; /* Deep pink */
            --btn-hover: #b03a5b;
            --card-bg: #fffbf7; /* Off-white for the paper card */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #fcd3e1 0%, #fbc2d4 100%);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevents scrolling while on the welcome screen */
            color: #4a4a4a;
        }

        /* --- Welcome / Start Screen --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #fcd3e1 0%, #fbc2d4 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            text-align: center;
            padding: 20px;
        }

        .welcome-title {
            font-family: 'Pacifico', cursive;
            color: var(--accent-pink);
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 30px;
            animation: pulse 2s infinite ease-in-out;
        }

        .start-btn {
            background-color: var(--accent-pink);
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(209, 77, 114, 0.3);
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .start-btn:hover {
            background-color: var(--btn-hover);
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(209, 77, 114, 0.4);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* --- Main Content Area --- */
        #main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 40px 20px;
            z-index: 1;
        }

        /* Title styling */
        .title {
            font-family: 'Pacifico', cursive;
            color: var(--accent-pink);
            font-size: 2.8rem;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-align: center;
        }

        /* Bouquet Image Container */
        .bouquet-container {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .bouquet-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .bouquet-img:hover {
            transform: scale(1.03);
        }

        /* Letter Card Styling */
        .letter-card {
            background-color: var(--card-bg);
            border: 2px solid #ffccd8;
            border-radius: 12px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(209, 77, 114, 0.15);
            transform: rotate(-1deg);
            transition: transform 0.3s ease;
            text-align: left;
            position: relative;
        }

        .letter-card:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .letter-card::before {
            content: '';
            position: absolute;
            top: 5px; right: 5px; bottom: 5px; left: 5px;
            border: 1px dashed #ffb3c6;
            border-radius: 8px;
            pointer-events: none;
        }

        .card-to {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: var(--accent-pink);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .card-message {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #5d5255;
            margin-bottom: 20px;
            font-weight: 400;
            white-space: pre-line;
        }

        .card-from {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: var(--accent-pink);
            text-align: right;
            font-weight: 700;
        }

        /* Action Buttons styling */
        .action-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            width: 100%;
            min-height: 60px; /* Gives room for the running button */
        }

        .choice-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
        }

        #no-btn {
            background-color: #8e8e93;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.1s ease; /* Fast transition for moving away */
        }
        
        #no-btn:hover {
            background-color: #636366;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @media (max-width: 480px) {
            .title, .welcome-title {
                font-size: 2.2rem;
            }
            .letter-card {
                padding: 20px 15px;
            }
        }

        /* Styling for the falling items */
        .falling-emoji {
            position: fixed;
            top: -5vh; 
            font-size: 1.8rem;
            z-index: 9999; 
            pointer-events: none; 
            animation: fallDown linear forwards;
        }

        /* The falling movement animation */
        @keyframes fallDown {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg); 
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 1. FIRST PAGE (WELCOME SCREEN) -->
    <div id="welcome-screen">
        <h1 class="welcome-title">A DigiBouquet for You</h1>
        <div class="welcome-icon">🌸</div>
        <button class="start-btn" id="start-btn">Open Your Bouquet</button>
    </div>

    <!-- 2. MAIN PAGE CONTENT -->
    <div id="main-content">
        
        <h1 class="title">i am sorry</h1>

        <!-- Bouquet Image -->
        <div class="bouquet-container">
            <img src="download (1).png" alt="A beautiful bouquet for you" class="bouquet-img">
        </div>

        <!-- Handwritten Letter Card -->
        <div class="letter-card">
            <div class="card-to">To: You</div>
            <div class="card-message">"Madam gii💞, sorry agar meri kisi baat se aapko takleef hui.  
Aap ka mood off dekh kar dil pareshan ho gaya he 😖. 
Please narazgi khatam kar dein aur pehle jese ho jayen. 
Maaf kar dein ❤️"</div>
            <div class="card-from">From: me</div>
        </div>

        <!-- Standard dynamic audio tag -->
        <audio id="bg-music" loop>
            <source src="song.mpeg" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <div style="font-size: 40px; margin-bottom: -10px;">👉🏻👈🏻</div>

        <!-- TWO INTERACTIVE BUTTONS -->
        <div class="action-container">
            <button class="start-btn choice-btn" id="yes-btn">Maaf Kiya ❤️</button>
            <button class="start-btn choice-btn" id="no-btn">Nahi 😤</button>
        </div>
        
    </div>

    <!-- 3. INTERACTION SCRIPT -->
    <script>
        const startBtn = document.getElementById('start-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        const mainContent = document.getElementById('main-content');
        const audio = document.getElementById('bg-music');
        
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        let flowerInterval;

        // Welcome screen action
        startBtn.addEventListener('click', () => {
            audio.play().catch(err => {
                console.log("Audio autoplay failed or was blocked:", err);
            });

            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';
            document.body.style.overflow = 'auto';
            mainContent.style.opacity = '1';
            mainContent.style.transform = 'translateY(0)';
        });

        // Flower Drop Logic
        function startFlowerShower() {
            // Prevent duplicate loops if clicked multiple times
            if (flowerInterval) return; 

            const emojis = ['🌸', '💖', '🌹', '💝', '✨', '🌷', '❤️'];
            
            flowerInterval = setInterval(() => {
                const emojiElement = document.createElement('div');
                emojiElement.classList.add('falling-emoji');
                
                emojiElement.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emojiElement.style.left = Math.random() * 100 + 'vw';
                emojiElement.style.fontSize = Math.random() * (2.2 - 1.2) + 1.2 + 'rem';
                emojiElement.style.animationDuration = Math.random() * 3 + 3 + 's';
                
                document.body.appendChild(emojiElement);
                
                setTimeout(() => {
                    emojiElement.remove();
                }, 6000);
            }, 120); 
        }

        // YES BUTTON: Triggers flower shower
        yesBtn.addEventListener('click', () => {
            startFlowerShower();
            yesBtn.innerText = "Thank you Madam gii! 🥰";
            yesBtn.style.transform = "scale(1.1)";
            noBtn.style.display = "none"; // Hide the No button completely
        });

        // NO BUTTON: Runs away on hover or tap
        const moveNoButton = () => {
            // Pick a random spot inside the viewport boundaries
            // Keeps it safe within visible margins
            const x = Math.random() * (window.innerWidth - 140);
            const y = Math.random() * (window.innerHeight - 60);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        };

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton); // Works beautifully on smartphones!
    </script>

</body>
</html>
